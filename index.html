<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Pricer</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/deviyl/media/refs/heads/main/icons/devicon.png">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="main-wrapper">

      <!-- Page header / meta -->
      <div class="container">
        <h1 id="page-title">Loading...</h1>
        <p class="dashboard-note">
          <span class="note-label">Note:</span>
          Prices are pulled from the buyer's current TornExchange list. Use the checkboxes to include or exclude
          a category from the grand total.
        </p>
        <div class="meta-row">
          <span id="last-updated" class="meta-text">Loading...</span>
        </div>
      </div>

      <!-- Grand total -->
      <div class="container" id="grand-total-container">
        <div class="grand-total-row">
          <span class="grand-total-label">Grand Total</span>
          <span class="grand-total-value" id="grand-total">—</span>
        </div>
      </div>

      <!-- Plushies -->
      <div class="container" id="section-Plushies">
        <div class="section-header">
          <label class="include-label" title="Include in grand total">
            <input type="checkbox" class="include-check" data-category="Plushies" checked>
            Include in total
          </label>
          <h2 class="section-title">Plushies</h2>
          <span class="section-subtotal" id="subtotal-Plushies">—</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead id="head-Plushies"></thead>
            <tbody id="body-Plushies">
              <tr class="error-row"><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Flowers -->
      <div class="container" id="section-Flowers">
        <div class="section-header">
          <label class="include-label" title="Include in grand total">
            <input type="checkbox" class="include-check" data-category="Flowers" checked>
            Include in total
          </label>
          <h2 class="section-title">Flowers</h2>
          <span class="section-subtotal" id="subtotal-Flowers">—</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead id="head-Flowers"></thead>
            <tbody id="body-Flowers">
              <tr class="error-row"><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
    <script src="script.js"></script>
  </body>
</html>
